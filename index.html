<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps AI Cours</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <section id="login-screen" class="screen active">
            <div class="login-box glass">
                <div class="role-selection">
                    <div id="role-admin" class="role-card" onclick="selectRole('ADMIN')">
                        <div class="icon-circle">⚙️</div>
                        <span>ADMIN</span>
                    </div>
                    <div id="role-user" class="role-card selected" onclick="selectRole('USER')">
                        <div class="icon-circle">👤</div>
                        <span>UTILISATEUR</span>
                    </div>
                </div>
                <div class="input-fields">
                    <input type="text" id="login-id" placeholder="USER">
                    <input type="password" id="login-pass" placeholder="Mot de passe">
                    <button class="btn-login" onclick="attemptLogin()">Se connecter</button>
                </div>
            </div>
        </section>

        <section id="main-app" class="screen">
            <div class="content-area">
                <div id="tab-home" class="tab-content active">
                    <div class="glass welcome-container">
                        <h2>Bienvenue</h2>
                        <input type="text" id="user-name" placeholder="Nom d'utilisateur">
                        <input type="text" id="user-api" placeholder="Code API Gemini">
                        <div class="token-badge">Analyses restantes : <span id="token-count">1</span></div>
                    </div>
                </div>

                <div id="tab-analyse" class="tab-content">
                    <div class="subject-nav">
                        <button class="add-sub-btn" onclick="addSubject()">+</button>
                        <div id="subject-list-container"></div>
                    </div>
                    <div id="subject-details" class="hidden">
                        <h3 id="current-subject-title"></h3>
                        <div class="action-buttons">
                            <input type="file" id="file-input" hidden onchange="handleFileUpload(this)">
                            <button id="btn-upload" class="btn-blue" onclick="document.getElementById('file-input').click()">Upload Max 500 Mo</button>
                            <div id="up-progress" class="progress-container hidden"><div class="progress-bar"></div><span>0%</span></div>
                            
                            <button id="btn-analyze" class="btn-red hidden" onclick="startAnalysis()">Analyse et résumer</button>
                            <div id="ai-progress" class="progress-container hidden"><div class="ai-bar"></div><span>0%</span></div>
                            
                            <div id="final-results-nav" class="hidden">
                                <button class="btn-green" onclick="showContent('resume')">Résumé</button>
                                <button class="btn-green" onclick="showContent('quiz')">Quiz</button>
                            </div>
                        </div>
                        <div id="display-window" class="glass result-box hidden"></div>
                    </div>
                </div>

                <div id="tab-achat" class="tab-content">
                    <div class="glass">
                        <table class="price-table">
                            <thead><tr><th>Pack</th><th>Prix</th><th>Analyses</th></tr></thead>
                            <tbody id="token-options">
                                <tr onclick="selectPack('Mora', 2000, 5)"><td>Mora</td><td>2000 Ar</td><td>5</td></tr>
                                <tr onclick="selectPack('Premium', 5000, 15)"><td>Premium</td><td>5000 Ar</td><td>15</td></tr>
                            </tbody>
                        </table>
                        <div id="pay-info" class="hidden">
                            <p>Envoyez vers : 034 29 944 11</p>
                            <input type="text" id="ref-input" placeholder="Ref Transfert">
                            <button class="btn-green" onclick="submitAchat()">Confirmer</button>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="nav-bar">
                <button onclick="showTab('home')">🏠 Accueil</button>
                <button onclick="showTab('analyse')">📊 Analyse</button>
                <button onclick="showTab('achat')">🛒 Achat</button>
                <button id="admin-nav" class="hidden" onclick="showTab('admin')">⚙️ Admin</button>
            </nav>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
