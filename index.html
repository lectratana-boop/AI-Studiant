<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Resumer Cour AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PAGE CHOIX -->
<div id="choicePage" class="center">
  <button onclick="selectRole('admin')" class="gold">ADMIN</button>
  <button onclick="selectRole('user')">UTILISATEUR</button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="hidden center">
  <input id="username" placeholder="USER">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Connexion</button>
</div>

<!-- USER INFO -->
<div id="userInfoPage" class="hidden center">
  <h2>Bienvenue sur Resumer Cour AI</h2>
  <input id="name" placeholder="Nom">
  <input id="apiKey" placeholder="Code API">
  <button onclick="enterApp()">Entrer</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- MENU -->
  <nav>
    <button onclick="showTab('analyse')">ANALYSE</button>
    <button onclick="showTab('token')">ACHETER TOKEN</button>
    <button onclick="showTab('admin')" id="adminTab" class="hidden">ADMIN</button>
  </nav>

  <!-- ANALYSE -->
  <div id="analyse" class="tab">
    <h2>Matières</h2>
    <button onclick="addSubject()">+</button>
    <div id="subjects"></div>
  </div>

  <!-- TOKEN -->
  <div id="token" class="tab hidden">
    <h2>Acheter Token</h2>
    <button onclick="buyToken()">MORA - 2000Ar (5 analyses)</button>
    <div id="payment" class="hidden">
      <p>Envoyer à : 0340000000 (MVola)</p>
      <input id="ref" placeholder="Ref Trans">
      <button onclick="confirmPayment()">Confirmer</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="admin" class="tab hidden">
    <h2>Dashboard Admin</h2>
    <div id="adminData"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
