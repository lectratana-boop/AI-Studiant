<div id="subject-selector" style="margin-bottom: 20px;">
    <p style="font-size: 0.9em; color: #94a3b8;">Choisir une matière :</p>
    <select id="current-subject" style="width: 100%; padding: 12px; border-radius: 10px; background: #334155; color: white; border: none;">
        <option value="Mathématiques">📐 Mathématiques</option>
        <option value="Physique-Chimie">🧪 Physique-Chimie</option>
        <option value="Malagasy">🇲🇬 Malagasy</option>
        <option value="SVT">🌿 SVT</option>
    </select>
</div>

<div id="course-history" style="margin-bottom: 20px;">
    <p style="font-size: 0.9em; color: #94a3b8;">Mes cours enregistrés :</p>
    <div id="history-list" style="display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto;">
        <p style="font-size: 0.8em; color: #475569;">Aucun cours dans cette matière.</p>
    </div>
</div>

<div id="new-upload-zone" style="border-top: 1px solid #334155; padding-top: 15px;">
    <label for="file-upload" class="custom-file-upload">
        <i class="fas fa-plus-circle"></i> Ajouter un nouveau cours
    </label>
    <input id="file-upload" type="file" accept=".pdf,.docx" onchange="handleFileUpload(event)"/>
</div>
