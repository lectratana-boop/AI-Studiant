<input id="file-upload" type="file" accept=".pdf,.doc,.docx,.jpg,.png" onchange="handleFileUpload(event)"/>

<div id="upload-status-container" class="hidden">
    <p id="file-info"></p>
    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>
    <p id="progress-text">0%</p>
</div>
