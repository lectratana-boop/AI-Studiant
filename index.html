<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expert Analyse 🎓</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <header>
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <h2 style="margin:0;">Expert Analyse 🎓</h2>
                    <button onclick="askNewKey()" style="background: #334155; border: none; color: white; padding: 10px; border-radius: 50%; width: 40px; height: 40px; cursor: pointer;">
                        <i class="fas fa-key"></i>
                    </button>
                </div>
            </header>

            <div style="background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 15px;">
                <label style="font-size: 0.8em; color: #94a3b8;">Matière :</label>
                <select id="current-subject" onchange="renderHistory()" style="width: 100%; padding: 10px; margin-top:5px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155;">
                    <option value="Mathématiques">📐 Mathématiques</option>
                    <option value="Physique-Chimie">🧪 Physique-Chimie</option>
                    <option value="Malagasy">🇲🇬 Malagasy</option>
                    <option value="SVT">🌿 SVT</option>
                </select>

                <div id="course-history" style="margin-top: 15px;">
                    <p style="font-size: 0.8em; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 5px;">Mes cours enregistrés :</p>
                    <div id="history-list" style="max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-top: 8px;"></div>
                </div>
            </div>

            <div class="upload-section">
                <label for="file-upload" class="custom-file-upload">
                    <i class="fas fa-plus-circle"></i> <span id="label-text">Ajouter un cours</span>
                </label>
                <p style="font-size: 0.7em; color: #94a3b8; text-align: center; margin: 5px 0;">PDF, Word, TXT (Max 50 Mo)</p>
                <input id="file-upload" type="file" accept=".pdf,.docx,.txt" onchange="handleFileUpload(event)"/>
                
                <div id="upload-status-container" class="hidden">
                    <div class="status-info"><span>Lecture...</span><span id="upload-perc">0%</span></div>
                    <div class="progress-bar"><div id="upload-fill"></div></div>
                </div>

                <button id="btn-ai" onclick="processCourse()" disabled class="btn-blue">En attente du fichier...</button>
                
                <div id="ia-detail-container" class="hidden">
                    <div class="status-info"><span>Analyse Gemini...</span><span id="ia-perc">0%</span></div>
                    <div class="progress-bar"><div id="ia-fill" class="orange"></div></div>
                    <p id="timer-text" style="text-align: center; font-size: 0.8em; color: #f59e0b; margin-top: 5px;"></p>
                </div>
            </div>

            <div id="results-container" class="hidden" style="margin-top: 20px;">
                <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                    <button id="tab-sum" onclick="switchTab('sum')" style="flex:1; padding: 12px; border-radius: 10px; border:none; background:#6366f1; color:white; font-weight:bold;">📖 Résumé</button>
                    <button id="tab-quiz" onclick="switchTab('quiz')" style="flex:1; padding: 12px; border-radius: 10px; border:none; background:#334155; color:white; font-weight:bold;">❓ Quiz</button>
                </div>
                <div id="summary-content"><div id="summary-result"></div></div>
                <div id="quiz-content" class="hidden"><div id="quiz-result"></div></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
