<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studiant v3 - Cloud Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div class="page">
                <header>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>Expert Analyse 🎓</h2>
                        <button onclick="resetApiKey()" style="width: auto; padding: 5px 10px; background: none; color: #94a3b8;">
                            <i class="fas fa-key"></i>
                        </button>
                    </div>
                    <div id="status-ia" class="status-badge">Moteur Cloud Connecté</div>
                </header>

                <div class="upload-section">
                    <label for="file-upload" class="custom-file-upload">
                        <i class="fas fa-cloud-upload-alt"></i> Charger PDF ou Word
                    </label>
                    <input id="file-upload" type="file" accept=".pdf,.docx" onchange="handleFileUpload(event)"/>
                    
                    <div id="upload-status-container" class="hidden">
                        <div class="status-info">
                            <span id="file-info">Prêt</span>
                            <span id="upload-perc" style="color: #3b82f6;">0%</span>
                        </div>
                        <div class="progress-bar"><div id="upload-fill" style="background: #3b82f6; width: 0%; height: 100%;"></div></div>
                    </div>

                    <button id="btn-ai" onclick="processCourse()" disabled class="btn-blue">En attente du fichier...</button>
                    
                    <div id="ia-detail-container" class="hidden">
                        <div class="status-info">
                            <span>Analyse Gemini en cours...</span>
                            <span id="ia-perc" style="color: #f59e0b;">0%</span>
                        </div>
                        <div class="progress-bar"><div id="ia-fill" style="background: #f59e0b; width: 0%; height: 100%;"></div></div>
                        <div class="ia-stats-row">
                            <span id="ia-done">Précision : Haute</span>
                            <span id="ia-rem">Format : Structuré</span>
                        </div>
                    </div>

                    <button id="btn-result" onclick="showResults()" class="hidden btn-green">✅ Voir Résumé & Quiz</button>
                </div>

                <div id="results-container" class="hidden">
                    <div id="summary-result" class="result-box"></div>
                    <div id="quiz-result" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
