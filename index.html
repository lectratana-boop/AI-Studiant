<div class="upload-section">
    <label for="file-upload" class="custom-file-upload">
        <i class="fas fa-file-upload"></i> Charger PDF ou Word
    </label>
    <input id="file-upload" type="file" accept=".pdf,.docx" onchange="handleFileUpload(event)"/>
    
    <div id="upload-status-container" class="hidden">
        <div class="status-info">
            <span id="file-info">Calcul...</span>
            <span id="upload-perc" style="color: #3b82f6;">0%</span>
        </div>
        <div class="progress-bar"><div id="upload-fill" class="fill-blue"></div></div>
        <p id="upload-eta" class="eta-small">Temps estimé : --s</p>
    </div>

    <button id="btn-ai" onclick="processCourse()" disabled class="btn-blue">Lancer l'Analyse</button>
    
    <div id="ia-detail-container" class="hidden">
        <div class="status-info">
            <span id="ia-status-text">Analyse IA en cours...</span>
            <span id="ia-perc" style="color: #f59e0b;">0%</span>
        </div>
        <div class="progress-bar"><div id="ia-fill" class="fill-orange"></div></div>
        <div class="ia-stats-row">
            <span id="ia-done">Vérifié : 0%</span>
            <span id="ia-rem">Reste : 100%</span>
        </div>
        <p id="ia-eta" class="eta-small">Fin prévue dans : -- min</p>
    </div>

    <button id="btn-result" onclick="showResults()" class="hidden btn-green">✅ Voir Résumé & Quiz Corrigé</button>
</div>
