<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studiant v3 - Final</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            <div id="main-page" class="page">
                <header>
                    <h2>Expert Analyse 🎓</h2>
                    <div id="status-ia" class="status-badge">Chargement du moteur IA...</div>
                </header>

                <div class="upload-section">
                    <label for="file-upload" class="custom-file-upload">
                        <i class="fas fa-file-medical"></i> Charger PDF ou Word
                    </label>
                    <input id="file-upload" type="file" accept=".pdf,.docx" onchange="handleFileUpload(event)"/>
                    
                    <div id="upload-status-container" class="hidden">
                        <div class="status-info">
                            <span id="file-info">Calcul...</span>
                            <span id="upload-perc" class="text-blue">0%</span>
                        </div>
                        <div class="progress-bar"><div id="upload-fill" class="fill-blue"></div></div>
                        <p id="upload-eta" class="eta-small">Préparation...</p>
                    </div>

                    <button id="btn-ai" onclick="processCourse()" disabled class="btn-action">En attente du fichier</button>
                    
                    <div id="ia-detail-container" class="hidden">
                        <div class="status-info">
                            <span id="ia-status-text">Analyse profonde...</span>
                            <span id="ia-perc" class="text-orange">0%</span>
                        </div>
                        <div class="progress-bar"><div id="ia-fill" class="fill-orange"></div></div>
                        <div class="ia-stats-row">
                            <span id="ia-done">Déjà vérifié : 0%</span>
                            <span id="ia-rem">Reste : 100%</span>
                        </div>
                        <p id="ia-eta" class="eta-small">Calcul du temps...</p>
                    </div>

                    <button id="btn-result" onclick="showResults()" class="hidden btn-green">✅ Voir Résumé & Quiz</button>
                </div>

                <div id="results-container" class="hidden">
                    <div id="summary-result" class="result-box"></div>
                    <div id="quiz-result" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
