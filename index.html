<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studiant - Expert Mode</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div class="phone-container">
        <div class="phone-screen">
            
            <div id="register-page" class="page">
                <div class="auth-box">
                    <div class="app-logo">🎓</div>
                    <h1>AI Studiant</h1>
                    <p>Votre coach IA personnel</p>
                    <input type="text" id="user-name" placeholder="Ton nom complet...">
                    <button onclick="finishRegister()">Commencer 🚀</button>
                </div>
            </div>

            <div id="dashboard-page" class="page hidden">
                <header>
                    <h3>Salut, <span id="display-name"></span> 👋</h3>
                    <p id="status-ia">IA en attente...</p>
                </header>
                <div class="grid" id="subjects-grid"></div>
                <button class="add-btn-main" onclick="addNewSubject()">+ Ajouter une matière</button>
            </div>

            <div id="subject-page" class="page hidden">
                <div class="nav-header">
                    <button class="back-btn" onclick="showDashboard()">⬅</button>
                    <h2 id="current-subject-title">Matière</h2>
                </div>
                
                <div class="upload-section">
                    <label for="file-upload" class="custom-file-upload">
                        <i class="fas fa-file-pdf"></i> Choisir le PDF du cours
                    </label>
                    <input id="file-upload" type="file" accept=".pdf" onchange="handleFileUpload(event)"/>
                    
                    <div id="upload-status-container" class="hidden">
                        <div class="status-info">
                            <span id="file-info">Fichier</span>
                            <span id="progress-text">0%</span>
                        </div>
                        <div class="progress-bar"><div id="progress-fill"></div></div>
                    </div>

                    <button id="btn-ai" onclick="processCourse()" disabled class="btn-blue">En attente du fichier...</button>
                    <p id="eta-text" class="hidden"></p>

                    <button id="btn-result" onclick="showResults()" class="hidden btn-green">
                        ✅ Voir Résumé & Quiz (<span id="result-progress">0%</span>)
                    </button>
                </div>

                <div id="results-container" class="hidden">
                    <div id="summary-result" class="result-box"></div>
                    <div id="quiz-result" class="result-box"></div>
                </div>
            </div>

        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
